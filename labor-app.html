<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무비 공수 조회</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
.container { max-width: 560px; margin: 0 auto; padding: 1rem; }
h1 { font-size: 26px; font-weight: 700; text-align: center; padding: 1.4rem 0 1.2rem; color: #1a1a1a; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
.card-title { font-size: 18px; color: #444; font-weight: 700; margin-bottom: 1.2rem; }
label { font-size: 16px; color: #555; display: block; margin-bottom: 6px; margin-top: 16px; font-weight: 600; }
label:first-of-type { margin-top: 0; }
input, select { width: 100%; padding: 14px 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 17px; background: #fafafa; color: #222; outline: none; }
input:focus, select:focus { border-color: #185FA5; background: #fff; }
.btn { width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 1.2rem; background: #fff; color: #222; font-weight: 700; }
.btn.primary { background: #185FA5; border-color: #185FA5; color: #fff; }
.msg { font-size: 15px; padding: 13px 14px; border-radius: 10px; margin-top: 1rem; display: none; }
.msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
.msg.error { background: #fdecea; color: #c62828; display: block; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1.2rem 0; }
.stat { background: #f5f5f5; border-radius: 10px; padding: 1.3rem; text-align: center; }
.stat .val { font-size: 38px; font-weight: 800; color: #185FA5; }
.stat .lbl { font-size: 15px; color: #777; margin-top: 6px; font-weight: 600; }
.day-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 0.75rem; }
.day-table th { background: #f0f0f0; padding: 7px 4px; text-align: center; font-weight: 700; color: #555; border: 1px solid #e0e0e0; min-width: 26px; }
.day-table td { padding: 7px 4px; text-align: center; border: 1px solid #e8e8e8; color: #333; }
.day-table td.worked { background: #e3f2fd; color: #1565c0; font-weight: 700; }
.day-table td.red-cell { background: #ffebee; color: #d32f2f; font-weight: 800; }
.day-table td.row-label { font-weight: 700; color: #555; background: #fafafa; white-space: nowrap; padding: 7px 10px; }
.site-info { font-size: 14px; color: #999; text-align: right; margin-top: 10px; }
.badge-job { font-size: 15px; padding: 5px 14px; border-radius: 20px; background: #fff3e0; color: #e65100; font-weight: 700; display: inline-block; margin-bottom: 0.6rem; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.admin-link { text-align: center; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>⚒️ 노무비 공수 조회</h1>
  <div style="text-align:center;font-size:11px;color:#cbcbcb;margin:-0.8rem 0 1rem;">버전 0715-E (2단계 조회·창구 연결)</div>

  <div class="card">
    <div class="card-title">본인 공수 조회</div>

    <!-- 1단계: 이름 + 핸드폰번호 -->
    <div id="step1">
      <label>이름</label>
      <input type="text" id="w-name" placeholder="홍길동" onkeydown="if(event.key==='Enter')checkWorker()">
      <label>핸드폰번호 (숫자만)</label>
      <input type="tel" id="w-phone" placeholder="01012345678" onkeydown="if(event.key==='Enter')checkWorker()">
      <button class="btn primary" id="chk-btn" onclick="checkWorker()">🔍 조회하기</button>
    </div>

    <!-- 확인된 사람 표시 -->
    <div id="who-box" style="display:none;font-size:16px;font-weight:700;color:#185FA5;padding:14px;background:#f0f7ff;border-radius:10px;">
      <span id="who-name"></span>님, 확인됐어요
    </div>

    <div id="w-msg" class="msg"></div>

    <!-- 2단계-A: 기존 가입자 → 비밀번호 입력 -->
    <div id="pw-box" style="display:none;margin-top:1.2rem;">
      <label>비밀번호 (숫자 6자리)</label>
      <input type="password" id="w-pw" inputmode="numeric" maxlength="6" placeholder="● ● ● ● ● ●" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn primary" id="login-btn" onclick="doLogin()">🔍 공수 조회</button>
      <button class="btn" onclick="resetAll()">← 이름·번호 다시 입력</button>
    </div>

    <!-- 2단계-B: 처음 온 사람 → 동의 + 비밀번호 만들기 -->
    <div id="signup-box" style="display:none;margin-top:1.2rem;border-top:1px solid #eee;padding-top:1.2rem;">
      <div style="font-weight:700;color:#185FA5;margin-bottom:10px;font-size:17px;">처음 오셨네요! 비밀번호를 만들어요</div>
      <div style="font-size:14px;color:#555;background:#f9f9f9;border-radius:10px;padding:14px;line-height:1.7;">
        <strong>[개인정보 수집·이용 동의]</strong><br>
        • 수집 항목: 이름, 휴대폰번호<br>
        • 이용 목적: 본인 근무(공수) 내역 조회<br>
        • 보유 기간: 현장 종료 후 1년<br>
        위 내용에 동의하셔야 가입 및 조회가 가능합니다.
      </div>
      <label style="display:flex;align-items:center;gap:10px;margin-top:12px;font-weight:600;cursor:pointer;font-size:16px;">
        <input type="checkbox" id="consent-chk" style="width:auto;transform:scale(1.4);"> 개인정보 수집·이용에 동의합니다
      </label>
      <label>새 비밀번호 (숫자 6자리)</label>
      <input type="password" id="w-newpw" inputmode="numeric" maxlength="6" placeholder="● ● ● ● ● ●" onkeydown="if(event.key==='Enter')doSignup()">
      <button class="btn primary" id="signup-btn" onclick="doSignup()">비밀번호 설정</button>
      <button class="btn" onclick="resetAll()">← 이름·번호 다시 입력</button>
    </div>
  </div>

  <div id="w-result" style="display:none;"></div>

  <div class="admin-link">
    <span style="font-size:13px;color:#aaa;">개발: 차민서</span>
  </div>
</div>

<script>
const SUPA_URL = 'https://iolokjrqgxdvtztssvql.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvbG9ranJxZ3hkdnR6dHNzdnFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODgwMjcsImV4cCI6MjA5Nzk2NDAyN30.Zr2pE1JsziO4V__AVAKiI2BDRqyda_vS_p95PqTL9S8';

function normalizePhone(p) { return String(p || '').replace(/[^0-9]/g, ''); }

// 서버 창구(RPC) 호출 — 테이블을 직접 열지 않는다.
async function rpc(fn, args) {
  const res = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(args)
  });
  const txt = await res.text();
  let data = null;
  try { data = txt ? JSON.parse(txt) : null; } catch (_) {}
  if (!res.ok) throw new Error((data && (data.message || data.hint)) || '서버 연결에 문제가 생겼어요');
  return data;
}

function showMsg(text, type) {
  const el = document.getElementById('w-msg');
  el.className = 'msg ' + type;
  el.textContent = text;
}
function clearMsg() { document.getElementById('w-msg').className = 'msg'; }
function show(id, on) { document.getElementById(id).style.display = on ? 'block' : 'none'; }
function busy(id, on, label) {
  const b = document.getElementById(id);
  b.disabled = on;
  b.innerHTML = on ? '<span class="spinner"></span>확인 중...' : label;
}

let _me = null; // { name, phone }

function resetAll() {
  _me = null;
  clearMsg();
  show('pw-box', false);
  show('signup-box', false);
  show('who-box', false);
  show('w-result', false);
  show('step1', true);
  document.getElementById('w-pw').value = '';
  document.getElementById('w-newpw').value = '';
  document.getElementById('consent-chk').checked = false;
}

// ===== 1단계: 이름 + 전화번호로 처음/기존 판별 =====
async function checkWorker() {
  const name = document.getElementById('w-name').value.trim();
  const phone = normalizePhone(document.getElementById('w-phone').value);
  clearMsg();
  show('w-result', false);
  if (!name || !phone) return showMsg('이름과 핸드폰번호를 입력해주세요', 'error');
  busy('chk-btn', true);
  try {
    const r = await rpc('worker_check', { p_name: name, p_phone: phone });
    const status = r && r.status;
    if (status === 'not_found') return showMsg('이름 또는 핸드폰번호가 명단에 없어요. 관리자에게 문의하세요', 'error');
    if (status === 'locked')    return showMsg('비밀번호를 여러 번 틀려 잠겼어요. 관리자에게 문의해 초기화하세요', 'error');

    _me = { name, phone };
    document.getElementById('who-name').textContent = name;
    show('who-box', true);
    show('step1', false);

    if (status === 'need_signup') { show('signup-box', true); document.getElementById('w-newpw').focus(); return; }
    if (status === 'need_pw')     { show('pw-box', true);     document.getElementById('w-pw').focus();    return; }
    showMsg('조회 중 문제가 생겼어요. 잠시 후 다시 시도해주세요', 'error');
  } catch (e) {
    showMsg(e.message, 'error');
  } finally {
    busy('chk-btn', false, '🔍 조회하기');
  }
}

// ===== 2단계-A: 기존 가입자 로그인 =====
async function doLogin() {
  if (!_me) return resetAll();
  const pw = document.getElementById('w-pw').value.trim();
  if (!/^\d{6}$/.test(pw)) return showMsg('비밀번호는 숫자 6자리로 입력해주세요', 'error');
  busy('login-btn', true);
  try {
    const r = await rpc('worker_login', { p_name: _me.name, p_phone: _me.phone, p_pw: pw });
    const status = r && r.status;
    if (status === 'wrong_pw') { document.getElementById('w-pw').value = ''; return showMsg(`비밀번호가 틀렸어요 (${r.fails}/3회)`, 'error'); }
    if (status === 'locked')   { show('pw-box', false); return showMsg('비밀번호를 3번 틀렸어요. 관리자에게 문의해 초기화하세요', 'error'); }
    if (status === 'blocked')  return showMsg('아직 출력 작업 중입니다 🛠️', 'error');
    if (status === 'bad_pw_format') return showMsg('비밀번호는 숫자 6자리로 입력해주세요', 'error');
    if (status === 'not_found') return showMsg('이름 또는 핸드폰번호가 명단에 없어요. 관리자에게 문의하세요', 'error');
    if (status === 'need_signup') { show('pw-box', false); show('signup-box', true); return; }
    if (status === 'ok') { clearMsg(); renderWorkerResult(r.worker, r.records || []); return; }
    showMsg('조회 중 문제가 생겼어요. 잠시 후 다시 시도해주세요', 'error');
  } catch (e) {
    showMsg(e.message, 'error');
  } finally {
    busy('login-btn', false, '🔍 공수 조회');
  }
}

// ===== 2단계-B: 처음 온 사람 가입 =====
async function doSignup() {
  if (!_me) return resetAll();
  if (!document.getElementById('consent-chk').checked) return showMsg('개인정보 수집·이용에 동의(체크)해주세요', 'error');
  const pw = document.getElementById('w-newpw').value.trim();
  if (!/^\d{6}$/.test(pw)) return showMsg('비밀번호는 숫자 6자리로 입력해주세요', 'error');
  busy('signup-btn', true);
  try {
    const r = await rpc('worker_signup', { p_name: _me.name, p_phone: _me.phone, p_pw: pw, p_consent: true });
    const status = r && r.status;
    if (status === 'ok') {
      show('signup-box', false);
      showMsg('비밀번호가 설정됐어요! 다음부턴 이 비밀번호로 조회하세요', 'success');
      renderWorkerResult(r.worker, r.records || []);
      return;
    }
    if (status === 'already')   { show('signup-box', false); show('pw-box', true); return showMsg('이미 비밀번호가 있어요. 비밀번호를 입력해주세요', 'error'); }
    if (status === 'not_found') return showMsg('명단에 없어요. 관리자에게 문의하세요', 'error');
    if (status === 'blocked')   return showMsg('아직 출력 작업 중입니다 🛠️', 'error');
    showMsg('가입 중 문제가 생겼어요. 다시 시도해주세요', 'error');
  } catch (e) {
    showMsg('가입 오류: ' + e.message, 'error');
  } finally {
    busy('signup-btn', false, '비밀번호 설정');
  }
}

function renderWorkerResult(worker, records) {
  const wrap = document.getElementById('w-result');
  if (!records.length) return showMsg('근무 기록이 없어요', 'error');
  const firstJob = (records.length && records[0].job_type) ? records[0].job_type : (worker.job_type || '');
  let html = `<div class="card">
    <div class="card-title">${worker.name}님의 공수</div>
    ${firstJob ? `<div><span class="badge-job">${firstJob}</span></div>` : ''}
    <div style="font-size:14px;color:#999;margin-top:4px;">총 ${records.length}개월 기록</div>
  </div>`;
  records.forEach((rec, i) => {
    html += `<div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;font-size:16px;">
        <span style="color:#185FA5;">${rec.year_month}${rec.job_type ? ` <span style="font-size:13px;color:#e65100;font-weight:700;">· ${rec.job_type}</span>` : ''}</span>
        <span style="color:#999;font-weight:600;font-size:14px;">${rec.site_name}</span>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="val">${rec.total_days || 0}</div><div class="lbl">출력일수</div></div>
        <div class="stat"><div class="val">${parseFloat(rec.total_work || 0).toFixed(1)}</div><div class="lbl">출력공수</div></div>
      </div>
      <div class="card-title" style="margin:0.5rem 0;font-size:16px;">일별 근로 내역</div>
      <div style="overflow-x:auto;"><table class="day-table" id="wdt-${i}"></table></div>
    </div>`;
  });
  wrap.innerHTML = html;
  wrap.style.display = 'block';
  records.forEach((rec, i) => renderDayTable(`wdt-${i}`, rec.daily_work, rec.year_month, rec.red_days));
  wrap.scrollIntoView({ behavior: 'smooth' });
}

function renderDayTable(tableId, daily_work, month, red_days) {
  const [yr, mo] = month.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const works = daily_work || {};
  const reds = red_days || {};
  let header = '<tr><th>구분</th>';
  for (let d = 1; d <= daysInMonth; d++) header += `<th>${d}</th>`;
  header += '</tr>';
  let row = '<tr><td class="row-label">공수</td>';
  for (let d = 1; d <= daysInMonth; d++) {
    const v = works[String(d)];
    if (v) {
      const cls = reds[String(d)] ? 'red-cell' : 'worked';
      row += `<td class="${cls}">${v}</td>`;
    } else {
      row += '<td></td>';
    }
  }
  document.getElementById(tableId).innerHTML = header + row + '</tr>';
}
</script>
</body>
</html>
