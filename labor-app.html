<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무비 공수 조회</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
.container { max-width: 560px; margin: 0 auto; padding: 1rem; }
h1 { font-size: 26px; font-weight: 700; text-align: center; padding: 1.4rem 0 1.2rem; color: #1a1a1a; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
.card-title { font-size: 18px; color: #444; font-weight: 700; margin-bottom: 1.2rem; }
label { font-size: 16px; color: #555; display: block; margin-bottom: 6px; margin-top: 16px; font-weight: 600; }
label:first-of-type { margin-top: 0; }
input, select { width: 100%; padding: 14px 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 17px; background: #fafafa; color: #222; outline: none; }
input:focus, select:focus { border-color: #185FA5; background: #fff; }
.btn { width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 1.2rem; background: #fff; color: #222; font-weight: 700; }
.btn.primary { background: #185FA5; border-color: #185FA5; color: #fff; }
.btn.sub { font-size: 15px; padding: 13px; margin-top: 0.75rem; background: #f0f0f0; color: #555; font-weight: 600; }
.msg { font-size: 15px; padding: 13px 14px; border-radius: 10px; margin-top: 1rem; display: none; }
.msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
.msg.error { background: #fdecea; color: #c62828; display: block; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1.2rem 0; }
.stat { background: #f5f5f5; border-radius: 10px; padding: 1.3rem; text-align: center; }
.stat .val { font-size: 38px; font-weight: 800; color: #185FA5; }
.stat .lbl { font-size: 15px; color: #777; margin-top: 6px; font-weight: 600; }
.day-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 0.75rem; }
.day-table th { background: #f0f0f0; padding: 7px 4px; text-align: center; font-weight: 700; color: #555; border: 1px solid #e0e0e0; min-width: 26px; }
.day-table td { padding: 7px 4px; text-align: center; border: 1px solid #e8e8e8; color: #333; }
.day-table td.worked { background: #e3f2fd; color: #1565c0; font-weight: 700; }
.day-table td.red-cell { background: #ffebee; color: #d32f2f; font-weight: 800; }
.day-table td.row-label { font-weight: 700; color: #555; background: #fafafa; white-space: nowrap; padding: 7px 10px; }
.day-table th.sun { color: #c62828; }
.day-table th.sat { color: #1565c0; }
.site-info { font-size: 14px; color: #999; text-align: right; margin-top: 10px; }
.badge-job { font-size: 15px; padding: 5px 14px; border-radius: 20px; background: #fff3e0; color: #e65100; font-weight: 700; display: inline-block; margin-bottom: 0.6rem; }
.history-card { background: #f9f9f9; border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.history-month { font-size: 16px; font-weight: 700; color: #185FA5; }
.history-site { font-size: 14px; color: #999; margin-top: 2px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.admin-link { text-align: center; margin-top: 1.5rem; }
.admin-link a { font-size: 13px; color: #aaa; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>⚒️ 노무비 공수 조회</h1>

  <div class="card">
    <div class="card-title">본인 공수 조회</div>
    <label>이름</label>
    <input type="text" id="w-name" placeholder="홍길동">
    <label>핸드폰번호 (숫자만)</label>
    <input type="tel" id="w-phone" placeholder="01012345678">
    <button class="btn sub" onclick="findMyRecords()">🔍 내 근무 이력 찾기</button>
    <div id="w-history" style="display:none; margin-top:0.75rem;"></div>
    <label>현장 선택</label>
    <select id="w-site"><option value="">-- 현장 선택 --</option></select>
    <label>조회 월</label>
    <input type="month" id="w-month">
    <button class="btn primary" onclick="workerLogin()">조회하기</button>
    <div id="w-msg" class="msg"></div>
  </div>

  <div id="w-result" style="display:none;">
    <div class="card">
      <div class="card-title" id="w-name-label"></div>
      <div id="w-job-badge"></div>
      <div class="stat-grid">
        <div class="stat"><div class="val" id="w-total-days">0</div><div class="lbl">출력일수</div></div>
        <div class="stat"><div class="val" id="w-total-work">0</div><div class="lbl">출력공수</div></div>
      </div>
      <div class="card-title" style="margin-top:0.5rem;font-size:16px;">일별 근로 내역</div>
      <div style="overflow-x:auto;"><table class="day-table" id="w-daytable"></table></div>
      <div class="site-info" id="w-site-label"></div>
    </div>
  </div>

  <div class="admin-link">
    <span style="font-size:13px;color:#aaa;">개발: 차민서</span>
  </div>
</div>

<script>
const SUPA_URL = 'https://iolokjrqgxdvtztssvql.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvbG9ranJxZ3hkdnR6dHNzdnFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODgwMjcsImV4cCI6MjA5Nzk2NDAyN30.Zr2pE1JsziO4V__AVAKiI2BDRqyda_vS_p95PqTL9S8';

function normalizePhone(p) { return String(p || '').replace(/[^0-9]/g, ''); }

async function db(method, table, body, params) {
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) url += '?' + params;
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || JSON.stringify(e)); }
  return res.json();
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function loadSites() {
  try {
    const data = await db('GET', 'work_records', null, 'select=site_name');
    const sites = [...new Set(data.map(d => d.site_name))].sort();
    const sel = document.getElementById('w-site');
    sel.innerHTML = '<option value="">-- 현장 선택 --</option>';
    sites.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
  } catch(e) {}
}

async function findMyRecords() {
  const name = document.getElementById('w-name').value.trim();
  const phone = normalizePhone(document.getElementById('w-phone').value);
  const histDiv = document.getElementById('w-history');
  if (!name || !phone) return showMsg('w-msg','이름과 핸드폰번호를 입력해주세요','error');
  document.getElementById('w-msg').className = 'msg';
  histDiv.style.display = 'block';
  histDiv.innerHTML = '<div style="font-size:15px;color:#999;padding:8px;">찾는 중...</div>';
  try {
    const workers = await db('GET', 'workers', null, `name=eq.${encodeURIComponent(name)}&phone=eq.${phone}&select=id,name`);
    if (!workers || workers.length === 0) {
      histDiv.innerHTML = '<div style="font-size:15px;color:#c62828;padding:10px;background:#fdecea;border-radius:10px;">이름 또는 핸드폰번호가 일치하지 않아요</div>';
      return;
    }
    const worker = workers[0];
    const records = await db('GET', 'work_records', null, `worker_id=eq.${worker.id}&select=site_name,year_month,total_work,total_days&order=year_month.desc`);
    if (!records || records.length === 0) {
      histDiv.innerHTML = '<div style="font-size:15px;color:#999;padding:10px;">근무 기록이 없어요</div>';
      return;
    }
    histDiv.innerHTML = `
      <div style="font-size:15px;font-weight:700;color:#555;margin-bottom:8px;">📋 ${worker.name}님 근무 이력 (클릭하면 자동선택)</div>
      ${records.map(r => `
        <div class="history-card" onclick="selectRecord('${r.site_name.replace(/'/g,"\\'")}','${r.year_month}')">
          <div>
            <div class="history-month">${r.year_month}</div>
            <div class="history-site">${r.site_name}</div>
          </div>
          <div style="font-size:15px;text-align:right;">
            <span style="color:#888;">공수</span> <strong style="color:#185FA5;font-size:17px;">${parseFloat(r.total_work).toFixed(1)}</strong>
          </div>
        </div>`).join('')}`;
  } catch(e) {
    histDiv.innerHTML = `<div style="font-size:15px;color:#c62828;padding:10px;">오류: ${e.message}</div>`;
  }
}

async function selectRecord(site, month) {
  const siteSel = document.getElementById('w-site');
  if (![...siteSel.options].some(o => o.value === site)) {
    siteSel.innerHTML += `<option value="${site}">${site}</option>`;
  }
  siteSel.value = site;
  document.getElementById('w-month').value = month;
  workerLogin();
}

async function workerLogin() {
  const name = document.getElementById('w-name').value.trim();
  const phone = normalizePhone(document.getElementById('w-phone').value);
  const site = document.getElementById('w-site').value;
  const month = document.getElementById('w-month').value;
  if (!name || !phone || !site || !month) return showMsg('w-msg','모두 입력해주세요','error');
  try {
    const workers = await db('GET', 'workers', null, `name=eq.${encodeURIComponent(name)}&phone=eq.${phone}&select=id,name,job_type`);
    if (!workers || workers.length === 0) return showMsg('w-msg','이름 또는 핸드폰번호가 틀렸어요','error');
    const worker = workers[0];
    const records = await db('GET', 'work_records', null, `worker_id=eq.${worker.id}&site_name=eq.${encodeURIComponent(site)}&year_month=eq.${month}&select=daily_work,total_days,total_work,site_name,red_days`);
    if (!records || records.length === 0) return showMsg('w-msg','해당 월의 공수 기록이 없어요','error');
    const rec = records[0];
    document.getElementById('w-msg').className = 'msg';
    document.getElementById('w-name-label').textContent = `${worker.name}님의 공수`;
    document.getElementById('w-job-badge').innerHTML = worker.job_type ? `<span class="badge-job">${worker.job_type}</span>` : '';
    document.getElementById('w-total-days').textContent = rec.total_days || 0;
    document.getElementById('w-total-work').textContent = parseFloat(rec.total_work || 0).toFixed(1);
    document.getElementById('w-site-label').textContent = `${rec.site_name} · ${month}`;
    renderDayTable('w-daytable', rec.daily_work, month, rec.red_days);
    document.getElementById('w-result').style.display = 'block';
    document.getElementById('w-result').scrollIntoView({ behavior: 'smooth' });
  } catch(e) { showMsg('w-msg', e.message, 'error'); }
}

function renderDayTable(tableId, daily_work, month, red_days) {
  const [yr, mo] = month.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const works = daily_work || {};
  const reds = red_days || {};
  let header = '<tr><th>구분</th>';
  for (let d = 1; d <= daysInMonth; d++) {
    header += `<th>${d}</th>`;
  }
  header += '</tr>';
  let row = '<tr><td class="row-label">공수</td>';
  for (let d = 1; d <= daysInMonth; d++) {
    const v = works[String(d)];
    if (v) {
      const cls = reds[String(d)] ? 'red-cell' : 'worked';
      row += `<td class="${cls}">${v}</td>`;
    } else {
      row += '<td></td>';
    }
  }
  document.getElementById(tableId).innerHTML = header + row + '</tr>';
}

const now = new Date();
document.getElementById('w-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
loadSites();
</script>
</body>
</html>
